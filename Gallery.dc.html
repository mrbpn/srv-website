<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/modernist-9afdef3c-ffaa-45b1-ba51-8abf543a4a5c/styles.css">
<script src="_ds/modernist-9afdef3c-ffaa-45b1-ba51-8abf543a4a5c/_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<style>
  body{ margin:0; background:var(--color-bg); }
  a{ color:var(--color-accent); } a:hover{ color:var(--color-accent-600); }
  .disp{ font-family:var(--font-heading); font-weight:800; letter-spacing:-0.02em; margin:0; }
  .kick{ display:block; font-size:13px; line-height:1.1; letter-spacing:0.1em; text-transform:uppercase; color:var(--color-accent-700); }
  .g-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  @media (max-width:820px){ .g-grid{ grid-template-columns:repeat(2,1fr); } .srv-pad{ padding-left:24px !important; padding-right:24px !important; } }
  @media (max-width:520px){ .g-grid{ grid-template-columns:1fr; } }
  .grayscale{ filter:none; transition:filter .25s ease; }
  .grayscale:hover{ filter:grayscale(1) contrast(1.08); }
</style>
</helmet>

<div style="font-family:var(--font-body); color:var(--color-text);">
  <dc-import name="Nav" active="gallery" hint-size="100%,88px"></dc-import>

  <section class="srv-pad" style="max-width:1120px; margin:0 auto; padding:56px 56px 36px;">
    <span class="kick" style="margin-bottom:18px;">Gallery</span>
    <h1 class="disp" style="font-size:clamp(38px,5vw,60px); line-height:1.04;">Life at Sahara Rastriya Vidhyalaya.</h1>
    <p style="font-size:18px; line-height:1.62; max-width:56ch; margin:24px 0 0; color:color-mix(in srgb,var(--color-text) 82%,transparent);">Drop your own photographs onto any tile — every image prints in the school's black-and-white house style.</p>
  </section>

  <section class="srv-pad" style="max-width:1120px; margin:0 auto; padding:12px 56px 20px;">
    <div class="seg" role="tablist">
      <label class="seg-opt"><input type="radio" name="gcat" checked onChange="{{ gAll }}">All</label>
      <label class="seg-opt"><input type="radio" name="gcat" onChange="{{ gCampus }}">School</label>
      <label class="seg-opt"><input type="radio" name="gcat" onChange="{{ gEvents }}">Events</label>
      <label class="seg-opt"><input type="radio" name="gcat" onChange="{{ gSport }}">Sport</label>
    </div>
  </section>

  <section class="srv-pad" style="max-width:1120px; margin:0 auto; padding:12px 56px 60px;">
    <div id="g-grid" class="g-grid">
      <figure class="grayscale" data-gcat="campus" style="margin:0;"><image-slot id="ga1" shape="rect" src="uploads/school1.jpg" placeholder="School" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="events" style="margin:0;"><image-slot id="ga2" shape="rect" src="uploads/even1.jpg" placeholder="Event" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="sport" style="margin:0;"><image-slot id="ga3" shape="rect" src="uploads/sport1.jpg" placeholder="Sport" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="events" style="margin:0;"><image-slot id="ga4" shape="rect" src="uploads/event2.jpg" placeholder="Event" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="campus" style="margin:0;"><image-slot id="ga5" shape="rect" src="uploads/school2.jpg" placeholder="School" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="sport" style="margin:0;"><image-slot id="ga6" shape="rect" src="uploads/sport2.jpg" placeholder="Sport" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="campus" style="margin:0;"><image-slot id="ga7" shape="rect" src="uploads/school3.jpg" placeholder="School" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="events" style="margin:0;"><image-slot id="ga8" shape="rect" src="uploads/event3.jpg" placeholder="Event" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
      <figure class="grayscale" data-gcat="sport" style="margin:0;"><image-slot id="ga9" shape="rect" src="uploads/sport3.jpg" placeholder="Sport" style="width:100%; aspect-ratio:4/3;"></image-slot></figure>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,300px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  filter(cat) {
    const grid = document.getElementById('g-grid');
    if (!grid) return;
    grid.querySelectorAll('[data-gcat]').forEach((el) => {
      el.style.display = (cat === 'all' || el.getAttribute('data-gcat') === cat) ? '' : 'none';
    });
  }
  renderVals() {
    return {
      gAll: () => this.filter('all'),
      gCampus: () => this.filter('campus'),
      gEvents: () => this.filter('events'),
      gSport: () => this.filter('sport'),
    };
  }
}
</script>
</body>
</html>

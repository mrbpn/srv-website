    <span class="nav-brand" style="margin:0; line-height:1.05;">Sahara Rastriya Vidhyalaya<span style="display:block; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--color-accent-700); font-weight:600;">Admire · Approach · Achieve</span></span>

</nav>
<div style="display:{{ menuDisplay }}; border-bottom:2px solid var(--color-divider); background:var(--color-bg);">

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;academics&quot;,&quot;facilities&quot;,&quot;faculty&quot;,&quot;news&quot;,&quot;events&quot;,&quot;gallery&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false };
  renderVals() {
    const a = this.props.active || '';
    const cur = (k) => (a === k ? 'page' : undefined);
    return {
      curAbout: cur('about'), curAcademics: cur('academics'), curFacilities: cur('facilities'), curFaculty: cur('faculty'),
      curNews: cur('news'), curEvents: cur('events'), curGallery: cur('gallery'), curContact: cur('contact'),
      menuDisplay: this.state.open ? 'block' : 'none',
      toggle: () => this.setState((s) => ({ open: !s.open })),
    };
  }
}
</script>
